<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <!-- Geha-style font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">

  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <img src="{{ site.author.avatar }}" class="avatar">

      <h1>{{ site.author.name }}</h1>
      <p class="bio">{{ site.author.bio }}</p>

      <p class="location">{{ site.author.location }}</p>

      <div class="icon-links">
        <a href="mailto:{{ site.author.email }}" aria-label="Email">
          <i class="fas fa-envelope"></i>
        </a>

        <a href="https://github.com/{{ site.author.github }}" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>

        <a href="{{ site.author.linkedin }}" aria-label="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
      </div>
    </aside>

    <!-- Main area -->
    <div class="main">

      <!-- Top nav -->
      <header class="topbar">
        <nav>
          <a href="/">Home</a>
          <a href="/research/">Research</a>
          <a href="/outreach/">Outreach</a>
          <a href="/cv/">CV</a>
        </nav>
      </header>

      <!-- Page content -->
      <main class="content">
        {{ content }}
      </main>

    </div>
  </div>
</body>
</html>
